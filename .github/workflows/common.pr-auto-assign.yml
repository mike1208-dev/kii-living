name: PR Auto Assign

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review

concurrency:
  group: common-pr-auto-assign-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write

jobs:
  assign:
    name: Assign PR
    if: github.event.pull_request.assignee == null && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Resolve assignee
        id: resolve
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: |
          if [ "$PR_AUTHOR_TYPE" = "Bot" ]; then
            echo "assignee=mike1208-dev" >> "$GITHUB_OUTPUT"
          else
            echo "assignee=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
          fi

      - name: Assign pull request
        env:
          API_URL: ${{ github.api_url }}
          ASSIGNEE: ${{ steps.resolve.outputs.assignee }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          payload=$(printf '{"assignees":["%s"]}' "$ASSIGNEE")
          http_status=$(curl \
            --silent \
            --show-error \
            --output response.json \
            --write-out '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL/repos/$REPOSITORY/issues/$ISSUE_NUMBER/assignees" \
            --data "$payload")

          if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
            exit 0
          fi

          if [ "$http_status" -eq 403 ] || [ "$http_status" -eq 404 ]; then
            echo "Request failed with status $http_status. Treating as success."
            cat response.json
            exit 0
          fi

          cat response.json
          exit 1
